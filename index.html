<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking de Asesores - Santander Consumer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --santander-red: #EC0000; }
        .bg-santander { background-color: var(--santander-red); }
        .text-santander { color: var(--santander-red); }
        .border-santander { border-color: var(--santander-red); }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--santander-red);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .sort-icon { font-size: 10px; color: #9ca3af; margin-left: 2px; }
        th:hover .sort-icon { color: #4b5563; }

        /* Ajustes para forzar que la tabla se ajuste al contenedor */
        table {
            table-layout: auto;
            width: 100%;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 min-h-screen flex flex-col">

    <header class="bg-santander text-white shadow-md py-4 px-6 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl md:text-2xl font-bold tracking-wide truncate">Plataforma de Seguimiento</h1>
        <span class="text-xs md:text-sm font-bold bg-white text-santander px-3 md:px-4 py-1 rounded-full shadow-sm uppercase tracking-wider ml-2 shrink-0">Santander</span>
    </header>

    <nav class="bg-white shadow mb-6">
        <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex space-x-4 md:space-x-8 overflow-x-auto whitespace-nowrap hide-scrollbar">
                <button id="btnTabRanking" onclick="mostrarPestaña('ranking')" class="border-santander text-santander border-b-2 py-4 px-1 text-sm font-bold transition duration-150">
                    🏆 Ranking de Equipos
                </button>
                <button id="btnTabRegistro" onclick="limpiarYMostrarRegistro()" class="border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 border-b-2 py-4 px-1 text-sm font-bold transition duration-150">
                    📝 Registrar Avance
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-[100%] mx-auto py-4 px-2 sm:px-4 flex-grow w-full">
        
        <!-- VISTA DE REGISTRO -->
        <section id="vistaRegistro" class="hidden bg-white rounded-xl shadow-md p-6 mb-8 border-t-4 border-santander w-full max-w-4xl mx-auto">
            <h2 id="formTitle" class="text-xl font-bold mb-5 text-gray-700">Registrar Avance del Asesor</h2>
            <form id="asesorForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Nombre del Asesor</label>
                    <input type="text" id="asesor" required placeholder="Ej. JUAN" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:border-santander uppercase">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Supervisor a Cargo</label>
                    <input type="text" id="supervisor" required list="listaSupervisores" placeholder="Ej. VANESSA" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:border-santander uppercase">
                    <datalist id="listaSupervisores">
                        <option value="VANESSA"></option>
                        <option value="DAMARIS"></option>
                        <option value="JONATAN"></option>
                    </datalist>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Meta PDP del Día</label>
                    <input type="number" id="metaPdp" required min="0" step="0.01" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:border-santander">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Avance PDP Registrado</label>
                    <input type="number" id="avancePdp" required min="0" step="0.01" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:border-santander">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Meta Pago (Recaudación)</label>
                    <input type="number" id="metaPago" required min="0" step="0.01" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:border-santander">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Pagos Confirmados</label>
                    <input type="number" id="pagos" required min="0" step="0.01" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:border-santander">
                </div>
                <div class="md:col-span-2 lg:col-span-3 hidden">
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Estado / Comentario</label>
                    <input type="text" id="comentario" placeholder="Ej. Solución financiera aplicada..." class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:border-santander">
                </div>
                
                <div class="md:col-span-2 lg:col-span-3 flex flex-wrap justify-end gap-3 mt-4">
                    <button type="button" id="btnCancelEdit" onclick="limpiarYMostrarRegistro()" class="hidden bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-6 rounded-md shadow-sm transition duration-200">
                        Cancelar
                    </button>
                    <button type="submit" id="btnSubmit" class="bg-santander hover:bg-red-700 text-white font-bold py-2 px-8 rounded-md shadow-sm transition duration-200 flex items-center gap-2">
                        <span id="btnSubmitText">Cargar Registro</span>
                        <div id="submitLoader" class="loader hidden" style="border-top-color: white;"></div>
                    </button>
                </div>
            </form>
            <div id="formAlert" class="hidden mt-4 p-3 rounded text-sm font-medium"></div>
        </section>

        <!-- VISTA DE RANKING MÚLTIPLE -->
        <section id="vistaRanking" class="w-full">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4 px-2">
                <h2 class="text-xl md:text-2xl font-bold text-gray-700">Monitoreo de Equipos en Piso</h2>
                <button onclick="cargarDatos()" class="text-sm bg-white shadow hover:bg-gray-50 text-gray-700 py-2 px-4 rounded border border-gray-300 transition font-semibold flex items-center gap-2">
                    ↻ Refrescar Datos
                </button>
            </div>
            
            <div id="tableLoader" class="flex justify-center items-center py-12">
                <div class="loader"></div>
                <span class="ml-3 text-gray-500 font-medium">Sincronizando con Base de Datos...</span>
            </div>

            <div id="emptyStateMessage" class="hidden bg-white rounded-xl shadow p-8 text-center text-gray-500 font-medium">Aún no hay asesores registrados en la base de datos.</div>
            
            <!-- Contenedor adaptado para evitar desbordes -->
            <div id="supervisoresContainer" class="grid grid-cols-1 lg:grid-cols-2 2xl:grid-cols-3 gap-4 hidden items-start w-full">
                <!-- Las cajas se inyectan dinámicamente aquí -->
            </div>
        </section>
    </main>

    <script>
        // =========================================================================
        const URL_WEB_APP = "https://script.google.com/macros/s/AKfycbxxN_L8MhMcnpZ_rpPK3fsuILRWnCwcKDBDwIKoEV4iKNsoGwahltleOXLiwFL3mox8/exec"; 
        // =========================================================================

        let editRowIndex = null;
        let datosGlobales = [];
        
        let currentSortField = 'pctPago';
        let currentSortDesc = true;

        const form = document.getElementById('asesorForm');
        const tableLoader = document.getElementById('tableLoader');
        const containerEquipos = document.getElementById('supervisoresContainer');
        const emptyStateMessage = document.getElementById('emptyStateMessage');
        const formAlert = document.getElementById('formAlert');
        const submitLoader = document.getElementById('submitLoader');
        const btnSubmit = document.getElementById('btnSubmit');
        const btnSubmitText = document.getElementById('btnSubmitText');
        const formTitle = document.getElementById('formTitle');
        const btnCancelEdit = document.getElementById('btnCancelEdit');

        const vistaRegistro = document.getElementById('vistaRegistro');
        const vistaRanking = document.getElementById('vistaRanking');
        const btnTabRanking = document.getElementById('btnTabRanking');
        const btnTabRegistro = document.getElementById('btnTabRegistro');

        function mostrarPestaña(pestaña) {
            if (pestaña === 'ranking') {
                vistaRanking.classList.remove('hidden');
                vistaRegistro.classList.add('hidden');
                btnTabRanking.classList.replace('border-transparent', 'border-santander');
                btnTabRanking.classList.replace('text-gray-500', 'text-santander');
                btnTabRegistro.classList.replace('border-santander', 'border-transparent');
                btnTabRegistro.classList.replace('text-santander', 'text-gray-500');
                cargarDatos();
            } else {
                vistaRegistro.classList.remove('hidden');
                vistaRanking.classList.add('hidden');
                btnTabRegistro.classList.replace('border-transparent', 'border-santander');
                btnTabRegistro.classList.replace('text-gray-500', 'text-santander');
                btnTabRanking.classList.replace('border-santander', 'border-transparent');
                btnTabRanking.classList.replace('text-santander', 'text-gray-500');
            }
        }

        function limpiarYMostrarRegistro() {
            form.reset();
            editRowIndex = null;
            formTitle.innerText = "Registrar Avance del Asesor";
            btnSubmitText.innerText = "Cargar Registro";
            btnCancelEdit.classList.add('hidden');
            formAlert.classList.add('hidden');
            mostrarPestaña('registro');
        }

        const formatoMoneda = (val) => new Intl.NumberFormat('es-PE', { style: 'currency', currency: 'PEN' }).format(val || 0);
        const formatoPorcentaje = (val) => new Intl.NumberFormat('es-PE', { style: 'percent', minimumFractionDigits: 1 }).format(val || 0);

        document.addEventListener('DOMContentLoaded', () => {
            mostrarPestaña('ranking');
        });

        function ordenarPor(campo) {
            if (currentSortField === campo) {
                currentSortDesc = !currentSortDesc;
            } else {
                currentSortField = campo;
                currentSortDesc = true;
            }
            renderizarTablas();
        }

        function getSortIcon(campo) {
            if (currentSortField !== campo) return '↕';
            return currentSortDesc ? '▼' : '▲';
        }

        function cargarDatos() {
            tableLoader.classList.remove('hidden');
            containerEquipos.classList.add('hidden');
            emptyStateMessage.classList.add('hidden');

            fetch(URL_WEB_APP)
                .then(res => res.json())
                .then(data => {
                    if(data.length === 0) {
                        emptyStateMessage.classList.remove('hidden');
                        tableLoader.classList.add('hidden');
                        return;
                    }

                    datosGlobales = data.map(row => {
                        const rowIndex = row['ROW_INDEX'];
                        const asesor = row['ASESOR'] || '-';
                        const metaPdp = parseFloat(row['META PDP DEL DIA']) || 0;
                        const avance = parseFloat(row['AVANCE']) || 0;
                        const metaPago = parseFloat(row['META PAGO']) || 0;
                        const pagos = parseFloat(row['PAGOS']) || 0;
                        const estado = row['ESTADO'] || '-';
                        const supervisor = row['SUPERVISOR'] ? row['SUPERVISOR'].toString().toUpperCase().trim() : 'SIN ASIGNAR';
                        
                        const pctPdp = metaPdp > 0 ? (avance / metaPdp) : 0;
                        const pctPago = metaPago > 0 ? (pagos / metaPago) : 0;
                        
                        return { rowIndex, asesor, supervisor, metaPdp, avance, pctPdp, metaPago, pagos, pctPago, estado };
                    });

                    renderizarTablas();
                    
                    tableLoader.classList.add('hidden');
                    containerEquipos.classList.remove('hidden');
                })
                .catch(err => {
                    tableLoader.innerHTML = `<span class="text-red-600 font-semibold bg-red-50 p-2 rounded block text-center">❌ Error de conexión.</span>`;
                });
        }

        function renderizarTablas() {
            const agrupado = {};
            datosGlobales.forEach(d => {
                if (!agrupado[d.supervisor]) agrupado[d.supervisor] = [];
                agrupado[d.supervisor].push(d);
            });

            containerEquipos.innerHTML = '';

            Object.keys(agrupado).sort().forEach(sup => {
                
                // Métrica de cumplimiento por equipo
                const totalAsesores = agrupado[sup].length;
                const cumplidores = agrupado[sup].filter(row => row.pctPago >= 0.7).length;
                const pctCumplen = totalAsesores > 0 ? (cumplidores / totalAsesores) * 100 : 0;
                const pctNoCumplen = totalAsesores > 0 ? 100 - pctCumplen : 0;

                agrupado[sup].sort((a, b) => {
                    let valA = a[currentSortField];
                    let valB = b[currentSortField];
                    
                    if (typeof valA === 'string') valA = valA.toLowerCase();
                    if (typeof valB === 'string') valB = valB.toLowerCase();
                    
                    if (valA < valB) return currentSortDesc ? 1 : -1;
                    if (valA > valB) return currentSortDesc ? -1 : 1;
                    return 0;
                });

                const filasHTML = agrupado[sup].map(row => {
                    let emoji = "😭";
                    let colorCumplimiento = "text-red-800 bg-red-100 border border-red-200";

                    if (row.pctPago >= 0.7) {
                        emoji = "😀";
                        colorCumplimiento = "text-green-800 bg-green-100 border border-green-200";
                    } else if (row.pctPago >= 0.5) {
                        emoji = "😐";
                        colorCumplimiento = "text-yellow-800 bg-yellow-100 border border-yellow-200";
                    }

                    // Se eliminaron espacios y paddings agresivos para máxima compactación
                    return `
                        <tr class="hover:bg-red-50 transition duration-150 border-b border-gray-100">
                            <td class="px-2 py-2 font-bold text-gray-800 break-words leading-tight max-w-[90px]">${row.asesor}</td>
                            <td class="px-1 py-2 text-gray-600 text-right whitespace-nowrap">${formatoMoneda(row.metaPdp)}</td>
                            <td class="px-1 py-2 text-gray-700 font-semibold text-right whitespace-nowrap">${formatoMoneda(row.avance)}</td>
                            <td class="px-1 py-2 text-center font-bold text-gray-600 bg-gray-50 whitespace-nowrap">${formatoPorcentaje(row.pctPdp)}</td>
                            <td class="px-1 py-2 text-gray-600 text-right whitespace-nowrap">${formatoMoneda(row.metaPago)}</td>
                            <td class="px-1 py-2 text-gray-700 font-semibold text-right whitespace-nowrap">${formatoMoneda(row.pagos)}</td>
                            <td class="px-1 py-2 text-center font-bold text-santander bg-red-50 whitespace-nowrap">${formatoPorcentaje(row.pctPago)}</td>
                            <td class="px-1 py-2 text-center">
                                <span class="px-1 py-0.5 rounded text-base shadow-sm inline-block ${colorCumplimiento}" title="Cumplimiento">${emoji}</span>
                            </td>
                            <td class="px-1 py-2 text-center whitespace-nowrap">
                                <button onclick="editarRegistro(${row.rowIndex}, '${row.asesor}', '${row.supervisor}', ${row.metaPdp}, ${row.avance}, ${row.metaPago}, ${row.pagos}, '${row.estado}')" class="text-blue-500 hover:text-blue-700 mx-0.5 text-sm transition" title="Editar">✏️</button>
                                <button onclick="eliminarRegistro(${row.rowIndex}, '${row.asesor}')" class="text-red-500 hover:text-red-700 mx-0.5 text-sm transition" title="Eliminar">🗑️</button>
                            </td>
                        </tr>
                    `;
                }).join('');

                const card = document.createElement('div');
                card.className = "bg-white border border-gray-200 rounded-xl shadow-md flex flex-col w-full overflow-hidden";
                card.innerHTML = `
                    <div class="bg-gray-800 text-white px-3 py-2 font-bold text-sm uppercase tracking-wider flex justify-between items-center">
                        <span class="truncate pr-2">👥 ${sup}</span>
                        <span class="text-[10px] bg-gray-700 px-2 py-1 rounded-full whitespace-nowrap shrink-0">${totalAsesores} Asesor(es)</span>
                    </div>
                    
                    <!-- Métrica de Cumplimiento -->
                    <div class="bg-gray-100 flex justify-between px-3 py-1.5 text-[11px] font-bold border-b-2 border-santander">
                        <span class="text-green-700">✅ Cumplen: ${pctCumplen.toFixed(0)}%</span>
                        <span class="text-red-700">❌ No Cumplen: ${pctNoCumplen.toFixed(0)}%</span>
                    </div>

                    <!-- Tabla compactada sin overflow oculto forzado -->
                    <div class="flex-1 pb-1">
                        <table class="w-full text-left text-[11px] leading-tight">
                            <thead>
                                <tr class="bg-gray-50 border-b border-gray-300 text-gray-600 uppercase">
                                    <th class="px-2 py-2 font-bold cursor-pointer hover:bg-gray-200" onclick="ordenarPor('asesor')" title="Filtrar">Asesor <span class="sort-icon">${getSortIcon('asesor')}</span></th>
                                    <th class="px-1 py-2 font-bold cursor-pointer hover:bg-gray-200 text-right" onclick="ordenarPor('metaPdp')" title="Filtrar">M.PDP <span class="sort-icon">${getSortIcon('metaPdp')}</span></th>
                                    <th class="px-1 py-2 font-bold cursor-pointer hover:bg-gray-200 text-right" onclick="ordenarPor('avance')" title="Filtrar">Av. <span class="sort-icon">${getSortIcon('avance')}</span></th>
                                    <th class="px-1 py-2 font-bold cursor-pointer hover:bg-gray-200 text-center" onclick="ordenarPor('pctPdp')" title="Filtrar">% <span class="sort-icon">${getSortIcon('pctPdp')}</span></th>
                                    <th class="px-1 py-2 font-bold cursor-pointer hover:bg-gray-200 text-right" onclick="ordenarPor('metaPago')" title="Filtrar">M.PAGO <span class="sort-icon">${getSortIcon('metaPago')}</span></th>
                                    <th class="px-1 py-2 font-bold cursor-pointer hover:bg-gray-200 text-right" onclick="ordenarPor('pagos')" title="Filtrar">Pagos <span class="sort-icon">${getSortIcon('pagos')}</span></th>
                                    <th class="px-1 py-2 font-bold cursor-pointer hover:bg-gray-200 text-center" onclick="ordenarPor('pctPago')" title="Filtrar">% <span class="sort-icon">${getSortIcon('pctPago')}</span></th>
                                    <th class="px-1 py-2 font-bold text-center">EST.</th>
                                    <th class="px-1 py-2 font-bold text-center">ACC.</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${filasHTML}
                            </tbody>
                        </table>
                    </div>
                `;
                containerEquipos.appendChild(card);
            });
        }

        function editarRegistro(rowIndex, asesor, supervisor, metaPdp, avance, metaPago, pagos, estado) {
            editRowIndex = rowIndex;
            document.getElementById('asesor').value = asesor;
            document.getElementById('supervisor').value = supervisor === 'SIN ASIGNAR' ? '' : supervisor;
            document.getElementById('metaPdp').value = metaPdp;
            document.getElementById('avancePdp').value = avance;
            document.getElementById('metaPago').value = metaPago;
            document.getElementById('pagos').value = pagos;
            document.getElementById('comentario').value = estado === '-' ? '' : estado;
            
            formTitle.innerText = `Editar Avance: ${asesor}`;
            btnSubmitText.innerText = "Actualizar Registro";
            btnCancelEdit.classList.remove('hidden');
            
            mostrarPestaña('registro');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function eliminarRegistro(rowIndex, asesor) {
            if(!confirm(`¿Estás seguro de que deseas eliminar el registro de ${asesor}?`)) return;
            
            tableLoader.classList.remove('hidden');
            containerEquipos.classList.add('hidden');
            
            fetch(URL_WEB_APP, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: 'delete', rowIndex: rowIndex })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") cargarDatos();
                else alert("Error: " + data.message);
            }).catch(err => {
                alert("Error de red al intentar eliminar.");
                cargarDatos();
            });
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            submitLoader.classList.remove('hidden');
            btnSubmit.disabled = true;
            btnSubmit.classList.add('opacity-75', 'cursor-not-allowed');
            formAlert.className = "hidden mt-4 p-3 rounded text-sm font-medium";

            const payload = {
                action: editRowIndex ? 'edit' : 'add',
                rowIndex: editRowIndex,
                asesor: document.getElementById('asesor').value,
                supervisor: document.getElementById('supervisor').value,
                metaPdp: document.getElementById('metaPdp').value,
                avancePdp: document.getElementById('avancePdp').value,
                metaPago: document.getElementById('metaPago').value,
                pagos: document.getElementById('pagos').value,
                comentario: document.getElementById('comentario').value || "Pendiente validación de Soluciones Financieras."
            };

            fetch(URL_WEB_APP, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                submitLoader.classList.add('hidden');
                btnSubmit.disabled = false;
                btnSubmit.classList.remove('opacity-75', 'cursor-not-allowed');

                if(data.status === "success") {
                    formAlert.innerHTML = editRowIndex ? `<strong>Éxito:</strong> Registro actualizado correctamente.` : `<strong>Éxito:</strong> Información del asesor registrada.`;
                    formAlert.classList.add('bg-green-100', 'text-green-800', 'border', 'border-green-300');
                    formAlert.classList.remove('hidden');
                    
                    setTimeout(() => {
                        limpiarYMostrarRegistro(); 
                        mostrarPestaña('ranking');
                    }, 1500);
                } else {
                    throw new Error(data.message);
                }
            })
            .catch(err => {
                submitLoader.classList.add('hidden');
                btnSubmit.disabled = false;
                btnSubmit.classList.remove('opacity-75', 'cursor-not-allowed');
                formAlert.innerHTML = `<strong>Error:</strong> Error de red. Intenta nuevamente.`;
                formAlert.classList.add('bg-red-100', 'text-red-800', 'border', 'border-red-300');
                formAlert.classList.remove('hidden');
            });
        });
    </script>
</body>
</html>
