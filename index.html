<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking de Asesores - Santander Consumer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --santander-red: #EC0000;
        }
        .bg-santander { background-color: var(--santander-red); }
        .text-santander { color: var(--santander-red); }
        .border-santander { border-color: var(--santander-red); }
        
        /* Animación de carga */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--santander-red);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <header class="bg-santander text-white shadow-md py-4 px-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold tracking-wide">Plataforma de Seguimiento y Ranking</h1>
        <span class="text-sm font-bold bg-white text-santander px-4 py-1 rounded-full shadow-sm uppercase tracking-wider">Santander Consumer</span>
    </header>

    <nav class="bg-white shadow mb-6">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex space-x-8">
                <button id="btnTabRanking" onclick="mostrarPestaña('ranking')" class="border-santander text-santander border-b-2 py-4 px-1 text-sm font-bold transition duration-150">
                    🏆 Ranking de Asesores
                </button>
                <button id="btnTabRegistro" onclick="mostrarPestaña('registro')" class="border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 border-b-2 py-4 px-1 text-sm font-bold transition duration-150">
                    📝 Registrar Avance
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8">
        
        <section id="vistaRegistro" class="hidden bg-white rounded-xl shadow-md p-6 mb-8 border-t-4 border-santander">
            <h2 class="text-xl font-bold mb-5 text-gray-700">Registrar Avance del Asesor</h2>
            <form id="asesorForm" class="grid grid-cols-1 md:grid-cols-3 gap-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Nombre del Asesor</label>
                    <input type="text" id="asesor" required placeholder="Ej. JUAN" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:border-santander focus:ring-1 focus:ring-santander">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Meta PDP del Día (Monto)</label>
                    <input type="number" id="metaPdp" required min="0" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:border-santander">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Avance PDP Registrado</label>
                    <input type="number" id="avancePdp" required min="0" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:border-santander">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Meta Pago (Recaudación)</label>
                    <input type="number" id="metaPago" required min="0" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:border-santander">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Pagos Confirmados</label>
                    <input type="number" id="pagos" required min="0" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:border-santander">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Estado / Comentario</label>
                    <input type="text" id="comentario" placeholder="Ej. Solución financiera aplicada..." class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:border-santander">
                </div>
                
                <div class="md:col-span-3 flex justify-end mt-2">
                    <button type="submit" id="btnSubmit" class="bg-santander hover:bg-red-700 text-white font-bold py-2 px-8 rounded-md shadow-sm transition duration-200 flex items-center gap-2">
                        <span>Cargar Registro</span>
                        <div id="submitLoader" class="loader hidden" style="border-top-color: white;"></div>
                    </button>
                </div>
            </form>
            <div id="formAlert" class="hidden mt-4 p-3 rounded text-sm font-medium"></div>
        </section>

        <section id="vistaRanking" class="bg-white rounded-xl shadow-md p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-700">Ranking de Asesores</h2>
                <button onclick="cargarDatos()" class="text-sm bg-gray-50 hover:bg-gray-100 text-gray-700 py-1.5 px-4 rounded border border-gray-300 transition font-semibold">
                    ↻ Actualizar Tabla
                </button>
            </div>
            
            <div id="tableLoader" class="flex justify-center items-center py-12">
                <div class="loader"></div>
                <span class="ml-3 text-gray-500 font-medium">Sincronizando con Google Sheets...</span>
            </div>

            <div class="overflow-x-auto hidden rounded-lg border border-gray-200" id="tableContainer">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200 text-gray-600 text-xs uppercase tracking-wider">
                            <th class="p-4 font-bold">Asesor</th>
                            <th class="p-4 font-bold">Meta PDP</th>
                            <th class="p-4 font-bold">Avance PDP</th>
                            <th class="p-4 font-bold text-center">% Avance</th>
                            <th class="p-4 font-bold">Meta Pago</th>
                            <th class="p-4 font-bold">Pagos Reales</th>
                            <th class="p-4 font-bold text-center">% Pago</th>
                            <th class="p-4 font-bold text-center">Cumplimiento</th>
                            <th class="p-4 font-bold">Estado / Comentario</th>
                        </tr>
                    </thead>
                    <tbody id="tablaAsesores" class="text-sm divide-y divide-gray-200">
                        <!-- Las filas se inyectan dinámicamente -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        // =========================================================================
        // URL VINCULADA A TU GOOGLE APPS SCRIPT
        // =========================================================================
        const URL_WEB_APP = "https://script.google.com/macros/s/AKfycbwoKkcMuLYkzdWwTsdxY5So4-l09ThrKFFDwyZpZQIhGPnZMgqscYVrQl-oFxbXWNBo/exec"; 
        // =========================================================================

        const form = document.getElementById('asesorForm');
        const tablaAsesores = document.getElementById('tablaAsesores');
        const tableLoader = document.getElementById('tableLoader');
        const tableContainer = document.getElementById('tableContainer');
        const formAlert = document.getElementById('formAlert');
        const submitLoader = document.getElementById('submitLoader');
        const btnSubmit = document.getElementById('btnSubmit');

        // Controladores de Vistas (Pestañas)
        const vistaRegistro = document.getElementById('vistaRegistro');
        const vistaRanking = document.getElementById('vistaRanking');
        const btnTabRanking = document.getElementById('btnTabRanking');
        const btnTabRegistro = document.getElementById('btnTabRegistro');

        function mostrarPestaña(pestaña) {
            if (pestaña === 'ranking') {
                vistaRanking.classList.remove('hidden');
                vistaRegistro.classList.add('hidden');
                
                // Estilos de la pestaña activa
                btnTabRanking.classList.replace('border-transparent', 'border-santander');
                btnTabRanking.classList.replace('text-gray-500', 'text-santander');
                
                // Estilos de la pestaña inactiva
                btnTabRegistro.classList.replace('border-santander', 'border-transparent');
                btnTabRegistro.classList.replace('text-santander', 'text-gray-500');
                
                // Actualizar datos al entrar al ranking
                cargarDatos();
            } else {
                vistaRegistro.classList.remove('hidden');
                vistaRanking.classList.add('hidden');
                
                // Estilos de la pestaña activa
                btnTabRegistro.classList.replace('border-transparent', 'border-santander');
                btnTabRegistro.classList.replace('text-gray-500', 'text-santander');
                
                // Estilos de la pestaña inactiva
                btnTabRanking.classList.replace('border-santander', 'border-transparent');
                btnTabRanking.classList.replace('text-santander', 'text-gray-500');
            }
        }

        // Formatos visuales para el panel financiero
        const formatoMoneda = (val) => new Intl.NumberFormat('es-PE', { style: 'currency', currency: 'PEN' }).format(val || 0);
        const formatoPorcentaje = (val) => new Intl.NumberFormat('es-PE', { style: 'percent', minimumFractionDigits: 1 }).format(val || 0);

        document.addEventListener('DOMContentLoaded', () => {
            mostrarPestaña('ranking'); 
        });

        function cargarDatos() {
            tableLoader.classList.remove('hidden');
            tableContainer.classList.add('hidden');

            // Agregamos { redirect: "follow" } para evitar cortes de conexión de Google
            fetch(URL_WEB_APP, { redirect: "follow" })
                .then(res => res.json())
                .then(data => {
                    tablaAsesores.innerHTML = '';
                    
                    data.forEach(row => {
                        const asesor = row['ASESOR'] || '-';
                        const metaPdp = parseFloat(row['META PDP DEL DIA']) || 0;
                        const avance = parseFloat(row['AVANCE']) || 0;
                        const pctPdp = parseFloat(row['PCT_PDP']) || 0;
                        const metaPago = parseFloat(row['META PAGO']) || 0;
                        const pagos = parseFloat(row['PAGOS']) || 0;
                        const pctPago = parseFloat(row['PCT_PAGO']) || 0; 
                        const cumplimiento = row['CUMPLIMIENTO'] || '-';
                        const estado = row['ESTADO'] || '-';

                        // Lógica de colores según el indicador de alcance (>70%)
                        let colorCumplimiento = "text-gray-700 bg-gray-100";
                        if(cumplimiento.includes(">70") || pctPago >= 0.7) colorCumplimiento = "text-green-800 bg-green-100 border border-green-200";
                        else if(pctPago < 0.7) colorCumplimiento = "text-red-800 bg-red-100 border border-red-200";

                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-red-50 transition duration-150";
                        tr.innerHTML = `
                            <td class="p-4 font-bold text-gray-800">${asesor}</td>
                            <td class="p-4 text-gray-600">${formatoMoneda(metaPdp)}</td>
                            <td class="p-4 text-gray-700 font-semibold">${formatoMoneda(avance)}</td>
                            <td class="p-4 text-center font-bold text-gray-600 bg-gray-50">${formatoPorcentaje(pctPdp)}</td>
                            <td class="p-4 text-gray-600">${formatoMoneda(metaPago)}</td>
                            <td class="p-4 text-gray-700 font-semibold">${formatoMoneda(pagos)}</td>
                            <td class="p-4 text-center font-bold text-santander bg-red-50">${formatoPorcentaje(pctPago)}</td>
                            <td class="p-4 text-center"><span class="px-3 py-1 rounded text-xs font-bold ${colorCumplimiento}">${cumplimiento}</span></td>
                            <td class="p-4 text-gray-600 italic text-xs whitespace-normal w-48">${estado}</td>
                        `;
                        tablaAsesores.appendChild(tr);
                    });

                    tableLoader.classList.add('hidden');
                    tableContainer.classList.remove('hidden');
                })
                .catch(err => {
                    console.error("Error de Fetch: ", err);
                    tableLoader.innerHTML = '<span class="text-red-600 font-semibold bg-red-50 p-2 rounded">❌ Error al conectar. Intenta subiendo a GitHub Pages o verifica los encabezados en Sheets.</span>';
                });
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            submitLoader.classList.remove('hidden');
            btnSubmit.disabled = true;
            btnSubmit.classList.add('opacity-75', 'cursor-not-allowed');
            formAlert.className = "hidden mt-4 p-3 rounded text-sm font-medium";

            const payload = {
                asesor: document.getElementById('asesor').value,
                metaPdp: document.getElementById('metaPdp').value,
                avancePdp: document.getElementById('avancePdp').value,
                metaPago: document.getElementById('metaPago').value,
                pagos: document.getElementById('pagos').value,
                comentario: document.getElementById('comentario').value || "Pendiente"
            };

            fetch(URL_WEB_APP, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload),
                redirect: "follow" // Soluciona bloqueos de redirección
            })
            .then(res => res.json())
            .then(data => {
                submitLoader.classList.add('hidden');
                btnSubmit.disabled = false;
                btnSubmit.classList.remove('opacity-75', 'cursor-not-allowed');

                if(data.status === "success") {
                    formAlert.innerHTML = `<strong>Éxito:</strong> Información del asesor registrada.`;
                    formAlert.classList.add('bg-green-100', 'text-green-800', 'border', 'border-green-300');
                    formAlert.classList.remove('hidden');
                    form.reset();
                    
                    setTimeout(() => {
                        formAlert.classList.add('hidden');
                        mostrarPestaña('ranking');
                    }, 1500);

                } else {
                    throw new Error(data.message);
                }
            })
            .catch(err => {
                submitLoader.classList.add('hidden');
                btnSubmit.disabled = false;
                btnSubmit.classList.remove('opacity-75', 'cursor-not-allowed');
                formAlert.innerHTML = `<strong>Error:</strong> No se pudo guardar. Revisa la consola o asegúrate de alojarlo en GitHub.`;
                formAlert.classList.add('bg-red-100', 'text-red-800', 'border', 'border-red-300');
                formAlert.classList.remove('hidden');
            });
        });
    </script>
</body>
</html>
